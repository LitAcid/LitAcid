<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LitAcid</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  background:#050505;
  color:white;
  font-family:Inter;
  overflow:hidden;
}

/* Rain canvas */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-2;
}

/* Fog particles */
.fog{
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle,rgba(255,255,255,0.04) 0%,transparent 70%);
  animation:fogmove 40s linear infinite;
  z-index:-1;
}

@keyframes fogmove{
  0%{transform:translate(-20%,-20%)}
  100%{transform:translate(0%,0%)}
}

/* Header */
header{
  text-align:center;
  padding:70px 20px;
}

header h1{
  font-family:Orbitron;
  font-size:48px;
  letter-spacing:4px;
}

/* Unlock editor */
#unlockBox {
  text-align:center;
  margin-bottom: 20px;
}
#unlockBox input {
  padding:6px 8px;
  border-radius:6px;
  border:none;
  outline:none;
  margin-right:6px;
}
#unlockBox button {
  padding:6px 10px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  background:white;
  color:black;
  font-weight:600;
}

/* Layout */
.container{
  display:flex;
  justify-content:center;
  gap:40px;
  padding:40px;
  flex-wrap:wrap;
}

/* Glass boxes */
.box{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:30px;
  width:260px;
  backdrop-filter:blur(12px);
  transition:0.4s;
}

.box:hover{
  transform:translateY(-6px);
  box-shadow:0 0 25px rgba(255,255,255,0.08);
}

/* Server centerpiece */
.server{
  width:320px;
  border:1px solid rgba(255,255,255,0.3);
  box-shadow:0 0 25px rgba(255,255,255,0.1);
}

/* Buttons */
.button{
  display:block;
  text-align:center;
  padding:12px;
  margin:12px 0;
  border-radius:12px;
  background:white;
  color:black;
  text-decoration:none;
  font-weight:600;
  transition:0.3s;
}

.button:hover{
  background:#dcdcdc;
  transform:scale(1.04);
}

/* Music player */
.music{
  position:fixed;
  bottom:20px;
  left:20px;
  background:rgba(255,255,255,0.1);
  padding:12px 16px;
  border-radius:12px;
  cursor:pointer;
}

/* Editable content */
#editableContent{
  min-height:80px;
}

/* Mobile */
@media(max-width:850px){
  .container{
    flex-direction:column;
    align-items:center;
  }
  .server{
    order:-1;
  }
}

</style>
</head>

<body>

<canvas id="rain"></canvas>
<div class="fog"></div>

<header>
<h1>LitAcid</h1>
<p>Minecraft PvP • Server Manager • Game Dev</p>
</header>

<!-- Unlock editor box -->
<div id="unlockBox">
  <input type="password" id="editorPassword" placeholder="Enter code to unlock editor">
  <button onclick="unlockEditor()">Unlock Editor Mode</button>
</div>

<div class="container">

<!-- Social -->
<div class="box">
<h3>Connect With Me</h3>
<a class="button" href="https://youtube.com/@litacid?si=DkSOiWLQn-48c3km">YouTube</a>
<a class="button" href="https://instagram.com/litacid2">Instagram</a>
<a class="button">Discord: @litacid</a>
</div>

<!-- Server -->
<div class="box server">
<h3>Minecraft Server</h3>
<p>
IP: <b>quitmc.playwithbao.com</b><br>
Port: 25565
</p>
<p>
Status: Online<br>
Players: Loading...
</p>
</div>

<!-- What am I working on box -->
<div class="box" id="workBox">
<h3>What am I working on rn</h3>
<div id="editableContent" contenteditable="false">
<p>Nothing for now, just chilling.</p>
</div>
</div>

</div>

<!-- Music -->
<div class="music" onclick="toggleMusic()">
🎵 Play / Pause Music
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5dcb5c1d20.mp3">
</audio>

<script>

/* Wind rain */
const canvas=document.getElementById("rain");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let rain=[];

for(let i=0;i<300;i++){
  rain.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    l:Math.random()*1,
    xs:-4+Math.random()*4,
    ys:8+Math.random()*10
  })
}

function drawRain(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle="rgba(255,255,255,0.15)";
  ctx.lineWidth=1;
  ctx.beginPath();
  for(let i=0;i<rain.length;i++){
    let r=rain[i];
    ctx.moveTo(r.x,r.y);
    ctx.lineTo(r.x+r.l*r.xs,r.y+r.l*r.ys);
  }
  ctx.stroke();
  moveRain();
}

function moveRain(){
  for(let i=0;i<rain.length;i++){
    let r=rain[i];
    r.x+=r.xs;
    r.y+=r.ys;
    if(r.x>canvas.width||r.y>canvas.height){
      r.x=Math.random()*canvas.width;
      r.y=-20;
    }
  }
}

setInterval(drawRain,30);

/* Thunder flash */
setInterval(()=>{
  if(Math.random()>0.9){
    document.body.style.background="#111";
    setTimeout(()=>{document.body.style.background="#050505";},120)
  }
},4000)

/* Music */
function toggleMusic(){
  let m=document.getElementById("music");
  if(m.paused){
    m.play();
  }else{
    m.pause();
  }
}

/* Editor unlock */
function unlockEditor(){
  const code=document.getElementById("editorPassword").value;
  if(code==="kys2"){
    document.getElementById("editableContent").contentEditable="true";
    alert("Editor Mode Unlocked! You can now edit the content directly.");
  } else{
    alert("Incorrect code!");
  }
}

</script>

</body>
</html>
