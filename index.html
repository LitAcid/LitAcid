<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>LitAcid</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Inter&display=swap" rel="stylesheet">

<style>

:root{
--theme: rgb(120,120,120);
}

body{
margin:0;
background:#050505;
color:white;
font-family:Inter;
overflow:hidden;
}

/* RAIN */
#rain{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

/* LIGHTNING */
#lightning{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
z-index:-1;
}

/* HEADER */
header{
text-align:center;
padding:80px 20px;
}

header h1{
font-family:Orbitron;
font-size:48px;
color:var(--theme);
text-shadow:0 0 20px var(--theme);
transition:0.2s;
}

</style>
</head>

<body>

<canvas id="rain"></canvas>
<div id="lightning"></div>

<header>
<h1>LitAcid</h1>
<p>Click anywhere to start experience</p>
</header>

<!-- AUDIO -->
<audio id="music" loop src="https://image2url.com/r2/default/audio/1774360436413-b8386253-55ef-4984-adfe-37e6030635d6.mp3"></audio>

<audio id="thunder" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6edb7f0c2e.mp3"></audio>

<script>

/* ================= MUSIC (FIXED HARD) ================= */

const music = document.getElementById("music");

let started = false;

async function startMusic(){

if(started) return;
started = true;

/* FORCE PLAY */
try{
await music.play();
}catch(e){
console.log("retrying...");
}

/* AUDIO ANALYSIS */
const ctx = new AudioContext();
const src = ctx.createMediaElementSource(music);
const analyser = ctx.createAnalyser();

src.connect(analyser);
analyser.connect(ctx.destination);

await ctx.resume();

/* COLOR REACTION */
const data = new Uint8Array(analyser.frequencyBinCount);

function animate(){
requestAnimationFrame(animate);

analyser.getByteFrequencyData(data);

let total = 0;
for(let i=0;i<data.length;i++) total += data[i];

let avg = total / data.length;
let brightness = Math.min(255, 60 + avg * 2);

document.documentElement.style.setProperty(
"--theme",
`rgb(${brightness},${brightness},${brightness})`
);
}

animate();
}

/* TRIGGER */
window.addEventListener("click", startMusic, {once:true});

/* ================= RAIN (VISIBLE FIX) ================= */

const canvas = document.getElementById("rain");
const ctxRain = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let drops = [];

for(let i=0;i<600;i++){
drops.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
xs:-2 + Math.random()*4,
ys:8 + Math.random()*8
});
}

function drawRain(){

ctxRain.clearRect(0,0,canvas.width,canvas.height);

/* MUCH MORE VISIBLE */
ctxRain.strokeStyle = "rgba(255,255,255,0.35)";
ctxRain.lineWidth = 1.2;

ctxRain.beginPath();

drops.forEach(d=>{

ctxRain.moveTo(d.x, d.y);
ctxRain.lineTo(d.x + d.xs, d.y + d.ys);

d.x += d.xs;
d.y += d.ys;

if(d.y > canvas.height){
d.y = -10;
d.x = Math.random()*canvas.width;
}

});

ctxRain.stroke();

requestAnimationFrame(drawRain);
}

drawRain();

/* ================= THUNDER ================= */

const lightning = document.getElementById("lightning");
const thunder = document.getElementById("thunder");

setInterval(()=>{

if(Math.random() > 0.8){

lightning.style.opacity = "1";

setTimeout(()=>{
lightning.style.opacity = "0";

thunder.currentTime = 0;
thunder.play().catch(()=>{});

},100);

}

},4000);

</script>

</body>
</html>
