<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>LitAcid</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Inter&display=swap" rel="stylesheet">

<style>
:root{--theme:rgb(200,200,200)}

body{
margin:0;
background:#050505;
color:white;
font-family:Inter;
overflow-x:hidden;
transition:0.3s;
}

header{text-align:center;padding:60px 20px}
header h1{
font-family:Orbitron;
font-size:48px;
color:var(--theme);
text-shadow:0 0 20px var(--theme);
}

.container{
display:flex;
justify-content:center;
gap:35px;
padding:30px;
flex-wrap:wrap;
}

.box{
background:rgba(255,255,255,0.05);
border:1px solid var(--theme);
border-radius:20px;
padding:28px;
width:280px;
backdrop-filter:blur(14px);
box-shadow:0 0 20px var(--theme);
}

.button{
display:block;
text-align:center;
padding:12px;
margin:10px 0;
border-radius:10px;
background:white;
color:black;
font-weight:600;
cursor:pointer;
}

/* POPUP */
#contactPopup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
align-items:center;
justify-content:center;
z-index:999;
}

.popupBox{
background:#111;
padding:25px;
border-radius:15px;
width:320px;
text-align:center;
border:1px solid var(--theme);
box-shadow:0 0 20px var(--theme);
}

input, textarea{
width:90%;
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

</style>
</head>

<body>

<header>
<h1>LitAcid</h1>
<p>Minecraft PvP • Server Manager • Website Developer</p>
</header>

<div class="container">

<div class="box">
<h3>Connect</h3>
<div class="button">Discord: @litacid</div>
<a class="button" href="https://instagram.com/litacid2" target="_blank">Instagram</a>
</div>

<div class="box">
<h3>🚀 Get Your Own Website</h3>

<div class="button" onclick="openContact()">
Get Started
</div>

<p style="font-size:13px;opacity:0.7">
Starts at $20 • Fast delivery
</p>
</div>

</div>

<!-- POPUP -->
<div id="contactPopup">
  <div class="popupBox">

    <h3>🚀 Get Your Website</h3>

    <p style="font-size:14px;opacity:0.8">
      DM me or send request 👇
    </p>

    <a class="button" href="https://instagram.com/litacid2" target="_blank">
      Instagram DM
    </a>

    <div class="button">
      Discord: @litacid
    </div>

    <hr style="margin:15px 0;opacity:0.2">

    <input id="clientName" placeholder="Your name">
    <textarea id="clientMsg" placeholder="What do you need?"></textarea>

    <div class="button" onclick="sendMessage()">
      Send Request
    </div>

    <div class="button" onclick="closeContact()">Close</div>

  </div>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "https://exdavylpexaiwzqpaxje.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4ZGF2eWxwZXhhaXd6cXBheGplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNTgyMzUsImV4cCI6MjA4OTkzNDIzNX0.Fog-IUWksijTELBUMCQZPoLLmzhblXy6_2VsK0VUw58"
);

/* POPUP */
function openContact(){
  document.getElementById("contactPopup").style.display="flex";
}

function closeContact(){
  document.getElementById("contactPopup").style.display="none";
}

/* SEND MESSAGE */
async function sendMessage(){

  const name = document.getElementById("clientName").value;
  const msg = document.getElementById("clientMsg").value;

  if(!name || !msg){
    alert("Fill all fields");
    return;
  }

  const { error } = await supabase
    .from("client_requests")
    .insert([
      { name: name, message: msg }
    ]);

  if(error){
    alert("Error sending message");
    console.log(error);
  } else {
    alert("Request sent successfully!");

    document.getElementById("clientName").value="";
    document.getElementById("clientMsg").value="";

    closeContact();
  }
}
</script>

</body>
</html>
