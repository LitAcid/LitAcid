<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LitAcid</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>

:root{--theme:rgb(255,0,0)}

body{
margin:0;
background:#050505;
color:white;
font-family:Inter;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-3;
}

#visualizer{
position:fixed;
bottom:0;
left:0;
width:100%;
height:120px;
z-index:-2;
opacity:0.5;
}

header{
text-align:center;
padding:60px 20px;
}

header h1{
font-family:Orbitron;
font-size:48px;
color:var(--theme);
text-shadow:0 0 20px var(--theme);
}

.container{
display:flex;
justify-content:center;
gap:35px;
padding:30px;
flex-wrap:wrap;
}

.box{
background:rgba(255,255,255,0.05);
border:1px solid var(--theme);
border-radius:20px;
padding:28px;
width:280px;
backdrop-filter:blur(14px);
box-shadow:0 0 20px var(--theme);
}

.server{width:320px}

.button{
display:block;
text-align:center;
padding:12px;
margin:10px 0;
border-radius:10px;
background:white;
color:black;
text-decoration:none;
font-weight:600;
}

#playerList div{
display:flex;
align-items:center;
gap:10px;
margin-bottom:6px;
}

#skinButton{
position:fixed;
bottom:20px;
left:20px;
}

#visitorBox{
display:none;
position:fixed;
bottom:20px;
right:20px;
background:#0009;
padding:8px 12px;
border-radius:8px;
}

.lightning{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

@media(max-width:850px){
.container{
flex-direction:column;
align-items:center;
}
.box{width:90%}
}

</style>
</head>
<body>

<canvas id="rain"></canvas>
<canvas id="visualizer"></canvas>

<div class="lightning" id="lightning"></div>

<header>
<h1>LitAcid</h1>
<p>Minecraft PvP • Server Manager • Game Dev</p>
</header>

<div class="container">

<div class="box">
<h3>Connect</h3>
<a class="button" href="https://youtube.com/@litacid">YouTube</a>
<a class="button" href="https://instagram.com/litacid2">Instagram</a>
<a class="button">Discord: @litacid</a>
</div>

<div class="box server">
<h3>Minecraft Server</h3>

<p>
IP: <b>quitmc.playwithbao.com</b><br>
Port: 25565
</p>

<p>
Status: <span id="serverStatus">Loading...</span><br>
Players: <span id="serverPlayers">...</span>
</p>

<p id="serverMOTD"></p>

<h4>Online Players</h4>
<div id="playerList">Loading...</div>

</div>

<div class="box">
<h3>What am I working on rn</h3>

<div id="editableContent" contenteditable="false">
Nothing right now.
</div>

</div>

</div>

<audio id="music" autoplay muted loop>
<source src="https://image2url.com/r2/default/audio/1773480604788-5b579849-e3af-42d9-bfa5-a4f55956d700.mp3" type="audio/mpeg">
</audio>

<audio id="thunderSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6edb7f0c2e.mp3">
</audio>

<div id="skinButton">
<a id="downloadSkin" class="button">Download My Skin</a>
</div>

<div id="visitorBox">
Visitors: <span id="visitorCount">0</span>
</div>

<script>

/* FIREBASE */

const firebaseConfig={
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_PROJECT.firebaseapp.com",
databaseURL:"https://YOUR_PROJECT.firebaseio.com",
projectId:"YOUR_PROJECT"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()

/* MUSIC */

const music=document.getElementById("music")

setTimeout(()=>{
music.muted=false
music.play().catch(()=>{})
},2000)

/* VISITOR COUNTER */

const visitRef=db.ref("visits")

visitRef.transaction(v=>(v||0)+1)

visitRef.on("value",snap=>{
document.getElementById("visitorCount").textContent=snap.val()
})

/* SERVER STATUS + PLAYERS */

async function fetchServer(){

try{

const r=await fetch("https://api.mcsrvstat.us/3/quitmc.playwithbao.com")

const d=await r.json()

document.getElementById("serverStatus").textContent=d.online?"Online":"Offline"

document.getElementById("serverPlayers").textContent=d.players?`${d.players.online}/${d.players.max}`:"0"

document.getElementById("serverMOTD").textContent=d.motd?.clean||""

const list=document.getElementById("playerList")

list.innerHTML=""

if(d.players?.list){

d.players.list.forEach(p=>{

const div=document.createElement("div")

div.innerHTML=`<img src="https://mc-heads.net/avatar/${p}/30"> ${p}`

list.appendChild(div)

})

}else{
list.innerHTML="No players online"
}

}catch{}

}

fetchServer()
setInterval(fetchServer,15000)

/* SKIN DOWNLOAD */

async function skin(){

const uuid=await fetch("https://api.mojang.com/users/profiles/minecraft/litacid").then(r=>r.json())

const data=await fetch(`https://sessionserver.mojang.com/session/minecraft/profile/${uuid.id}`).then(r=>r.json())

const tex=JSON.parse(atob(data.properties[0].value))

document.getElementById("downloadSkin").href=tex.textures.SKIN.url

}

skin()

/* RAIN */

const rainCanvas=document.getElementById("rain")
const rctx=rainCanvas.getContext("2d")

rainCanvas.width=window.innerWidth
rainCanvas.height=window.innerHeight

let rain=[]

for(let i=0;i<400;i++){

rain.push({
x:Math.random()*rainCanvas.width,
y:Math.random()*rainCanvas.height,
xs:-3+Math.random()*6,
ys:10+Math.random()*8
})

}

function drawRain(){

rctx.clearRect(0,0,rainCanvas.width,rainCanvas.height)

rctx.strokeStyle="rgba(255,255,255,0.15)"
rctx.beginPath()

rain.forEach(r=>{

rctx.moveTo(r.x,r.y)
rctx.lineTo(r.x+r.xs,r.y+r.ys)

r.x+=r.xs
r.y+=r.ys

if(r.y>rainCanvas.height){
r.y=-10
r.x=Math.random()*rainCanvas.width
}

})

rctx.stroke()

}

setInterval(drawRain,30)

/* LIGHTNING */

const lightning=document.getElementById("lightning")
const thunder=document.getElementById("thunderSound")

setInterval(()=>{

if(Math.random()>0.7){

lightning.style.opacity="0.8"

setTimeout(()=>{

lightning.style.opacity="0"

thunder.play()

},120)

}

},4000)

/* MUSIC VISUALIZER */

const audioCtx=new AudioContext()

const analyser=audioCtx.createAnalyser()

const source=audioCtx.createMediaElementSource(music)

source.connect(analyser)

analyser.connect(audioCtx.destination)

analyser.fftSize=256

const bufferLength=analyser.frequencyBinCount

const dataArray=new Uint8Array(bufferLength)

const vcanvas=document.getElementById("visualizer")

const vctx=vcanvas.getContext("2d")

vcanvas.width=window.innerWidth
vcanvas.height=120

function drawVisualizer(){

requestAnimationFrame(drawVisualizer)

analyser.getByteFrequencyData(dataArray)

vctx.clearRect(0,0,vcanvas.width,vcanvas.height)

const barWidth=vcanvas.width/bufferLength

let x=0

for(let i=0;i<bufferLength;i++){

const h=dataArray[i]

vctx.fillStyle="rgb(0,255,255)"

vctx.fillRect(x,vcanvas.height-h/2,barWidth,h/2)

x+=barWidth+1

}

}

music.addEventListener("play",()=>{
audioCtx.resume()
drawVisualizer()
})

/* COLOR CYCLE */

let r=255,g=0,b=0

setInterval(()=>{

if(r>0&&b===0){r--;g++}
else if(g>0&&r===0){g--;b++}
else if(b>0&&g===0){b--;r++}

const c=`rgb(${r},${g},${b})`

document.documentElement.style.setProperty("--theme",c)

document.querySelectorAll(".box").forEach(el=>{
el.style.borderColor=c
el.style.boxShadow=`0 0 20px ${c}`
})

},30)

</script>

</body>
</html>
