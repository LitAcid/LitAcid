<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LitAcid</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>

:root{--theme:rgb(255,0,0)}

body{
margin:0;
background:#050505;
color:white;
font-family:Inter;
overflow-x:hidden;
}

header{
text-align:center;
padding:60px 20px;
}

header h1{
font-family:Orbitron;
font-size:45px;
color:var(--theme);
text-shadow:0 0 15px var(--theme);
}

.container{
display:flex;
gap:30px;
justify-content:center;
flex-wrap:wrap;
padding:20px;
}

.box{
background:rgba(255,255,255,0.05);
border:1px solid var(--theme);
padding:25px;
border-radius:15px;
width:280px;
backdrop-filter:blur(10px);
}

.button{
display:block;
text-align:center;
background:white;
color:black;
padding:10px;
margin-top:10px;
border-radius:8px;
cursor:pointer;
text-decoration:none;
font-weight:bold;
}

.button:hover{
background:var(--theme);
color:white;
}

#playerList div{
display:flex;
align-items:center;
gap:8px;
margin-bottom:5px;
}

#unlockBox{
position:fixed;
top:10px;
left:10px;
}

#songPanel{
display:none;
position:fixed;
top:10px;
right:10px;
background:#000a;
padding:8px;
border-radius:8px;
}

#visitorBox{
display:none;
position:fixed;
bottom:10px;
right:10px;
background:#000a;
padding:8px;
border-radius:8px;
}

#skinButton{
position:fixed;
bottom:10px;
left:10px;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

@media(max-width:800px){

.container{
flex-direction:column;
align-items:center;
}

.box{
width:90%;
}

}

</style>
</head>
<body>

<header>
<h1>LitAcid</h1>
<p>Minecraft Server</p>
</header>

<div id="unlockBox">
<input id="editorPassword" placeholder="editor code">
<button onclick="unlockEditor()">Unlock</button>
</div>

<div id="songPanel">
<input id="songURL" placeholder="mp3 url">
<button onclick="changeSong()">Set Song</button>
</div>

<div class="container">

<div class="box">
<h3>Connect</h3>
<a class="button" href="https://youtube.com/@litacid">YouTube</a>
<a class="button" href="https://instagram.com/litacid2">Instagram</a>
</div>

<div class="box">

<h3>Server</h3>

<p>
IP: <b id="serverIP">quitmc.playwithbao.com</b>
</p>

<button class="button" onclick="copyIP()">Join Server</button>

<p>Status: <span id="status">...</span></p>
<p>Players: <span id="players">...</span></p>

</div>

<div class="box">
<h3>Online Players</h3>
<div id="playerList">Loading...</div>
</div>

</div>

<audio id="music" loop autoplay></audio>

<div id="visitorBox">
Visitors: <span id="visitorCount">0</span>
</div>

<div id="skinButton">
<a id="downloadSkin" class="button">Download My Skin</a>
</div>

<canvas id="rain"></canvas>

<script>

/* FIREBASE */

const firebaseConfig={
apiKey:"YOUR_API",
authDomain:"YOUR_PROJECT.firebaseapp.com",
databaseURL:"https://YOUR_PROJECT.firebaseio.com",
projectId:"YOUR_PROJECT"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()

/* MUSIC SYSTEM */

const music=document.getElementById("music")

db.ref("song").on("value",snap=>{

const url=snap.val()

if(!url)return

music.src=url
music.load()

music.play().catch(()=>{})

})

function changeSong(){

const url=document.getElementById("songURL").value

if(!url)return

db.ref("song").set(url)

}

/* EDITOR MODE */

function unlockEditor(){

if(document.getElementById("editorPassword").value==="kys2"){

document.getElementById("songPanel").style.display="block"
document.getElementById("visitorBox").style.display="block"

}

}

/* VISITOR COUNTER */

const visitRef=db.ref("visits")

visitRef.transaction(v=>(v||0)+1)

visitRef.on("value",snap=>{
document.getElementById("visitorCount").textContent=snap.val()
})

/* SERVER STATUS */

async function server(){

try{

const r=await fetch("https://api.mcsrvstat.us/3/quitmc.playwithbao.com")

const d=await r.json()

document.getElementById("status").textContent=d.online?"Online":"Offline"

document.getElementById("players").textContent=d.players?d.players.online:0

}catch{}

}

server()
setInterval(server,15000)

/* PLAYER LIST */

async function players(){

try{

const r=await fetch("https://api.mcsrvstat.us/3/quitmc.playwithbao.com")

const d=await r.json()

const list=document.getElementById("playerList")

if(!d.players||!d.players.list){

list.innerHTML="No players online"

return

}

list.innerHTML=""

d.players.list.forEach(p=>{

const div=document.createElement("div")

div.innerHTML=`<img src="https://mc-heads.net/avatar/${p}/30"> ${p}`

list.appendChild(div)

})

}catch{}

}

players()
setInterval(players,15000)

/* COPY IP */

function copyIP(){

const ip="quitmc.playwithbao.com"

navigator.clipboard.writeText(ip)

alert("IP copied")

}

/* SKIN DOWNLOAD */

async function skin(){

const uuid=await fetch("https://api.mojang.com/users/profiles/minecraft/litacid").then(r=>r.json())

const data=await fetch(`https://sessionserver.mojang.com/session/minecraft/profile/${uuid.id}`).then(r=>r.json())

const tex=JSON.parse(atob(data.properties[0].value))

document.getElementById("downloadSkin").href=tex.textures.SKIN.url

}

skin()

/* RAIN EFFECT */

const canvas=document.getElementById("rain")

const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let rain=[]

for(let i=0;i<300;i++){

rain.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
xs:-3+Math.random()*6,
ys:10+Math.random()*8
})

}

function drawRain(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.strokeStyle="rgba(255,255,255,0.2)"

ctx.beginPath()

rain.forEach(r=>{

ctx.moveTo(r.x,r.y)
ctx.lineTo(r.x+r.xs,r.y+r.ys)

r.x+=r.xs
r.y+=r.ys

if(r.y>canvas.height){
r.y=-10
r.x=Math.random()*canvas.width
}

})

ctx.stroke()

}

setInterval(drawRain,30)

/* COLOR CYCLE */

let r=255,g=0,b=0

setInterval(()=>{

if(r>0&&b===0){r--;g++}
else if(g>0&&r===0){g--;b++}
else if(b>0&&g===0){b--;r++}

const c=`rgb(${r},${g},${b})`

document.documentElement.style.setProperty("--theme",c)

},30)

</script>

</body>
</html>
