<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LitAcid</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
/* --- Base Styles --- */
body {
  margin: 0;
  background: #050505;
  color: white;
  font-family: Inter;
  overflow: hidden;
  cursor: url('https://i.imgur.com/4NZ6uLY.png'), auto; /* optional custom cursor */
}
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -3;
}

/* --- Fog --- */
.fog {
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
  animation: fogmove 50s linear infinite;
  z-index: -2;
}
@keyframes fogmove {
  0% { transform: translate(-20%, -20%) }
  100% { transform: translate(0%,0%) }
}

/* --- Header --- */
header {
  text-align: center;
  padding: 70px 20px;
}
header h1 {
  font-family: Orbitron;
  font-size: 52px;
  letter-spacing: 5px;
  color: #0ff;
  text-shadow: 0 0 12px #0ff, 0 0 24px #0ff55;
}
header p {
  font-size: 16px;
  color: #ccc;
}

/* --- Unlock Editor Top-left --- */
#unlockBox {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 10;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
#unlockBox input, #unlockBox button {
  padding:6px 10px;
  border-radius:6px;
  border:none;
  outline:none;
  font-size:14px;
  cursor:pointer;
}

/* --- Container Boxes --- */
.container {
  display:flex;
  justify-content:center;
  gap:40px;
  padding:40px;
  flex-wrap:wrap;
}
.box {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(0,255,255,0.15);
  border-radius: 20px;
  padding: 30px;
  width: 280px;
  backdrop-filter: blur(15px);
  transition: 0.4s;
  box-shadow: 0 0 20px rgba(0,255,255,0.1);
}
.box:hover {
  transform: translateY(-8px);
  box-shadow: 0 0 35px rgba(0,255,255,0.2);
}
.server {
  width: 340px;
  border-color: rgba(0,255,255,0.25);
}
.button {
  display:block;
  text-align:center;
  padding:12px;
  margin:12px 0;
  border-radius:12px;
  background:white;
  color:black;
  text-decoration:none;
  font-weight:600;
  transition:0.3s;
  box-shadow: 0 0 10px rgba(0,255,255,0.2);
}
.button:hover {
  background: #0ff;
  color: #050505;
  transform: scale(1.05);
  box-shadow: 0 0 25px #0ff;
}

/* --- Editable Content --- */
#editableContent {
  min-height: 80px;
  outline: none;
}

/* --- Skin Button Bottom-left --- */
#skinButton {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 10;
}
#skinButton .button {
  padding:8px 12px;
  font-size:14px;
}

/* --- Responsive --- */
@media(max-width:850px){
  .container { flex-direction: column; align-items:center; }
  .server { order: -1; }
}
</style>
</head>
<body>

<canvas id="rain"></canvas>
<div class="fog"></div>

<header>
<h1>LitAcid</h1>
<p>Minecraft PvP • Server Manager • Game Dev</p>
</header>

<!-- Unlock Editor Box -->
<div id="unlockBox">
  <input type="password" id="editorPassword" placeholder="Enter code to unlock editor">
  <button onclick="unlockEditor()">Unlock Editor Mode</button>
</div>

<!-- Boxes -->
<div class="container">
  <!-- Social -->
  <div class="box">
    <h3>Connect With Me</h3>
    <a class="button" href="https://youtube.com/@litacid?si=DkSOiWLQn-48c3km">YouTube</a>
    <a class="button" href="https://instagram.com/litacid2">Instagram</a>
    <a class="button">Discord: @litacid</a>
  </div>

  <!-- Server Info -->
  <div class="box server">
    <h3>Minecraft Server</h3>
    <p>IP: <b id="serverIP">quitmc.playwithbao.com</b><br>
    Port: <span id="serverPort">25565</span></p>
    <p>Status: <span id="serverStatus">Loading...</span><br>
    Players: <span id="serverPlayers">Loading...</span></p>
    <p id="serverMOTD"></p>
  </div>

  <!-- Work Box -->
  <div class="box" id="workBox">
    <h3>What am I working on rn</h3>
    <div id="editableContent" contenteditable="false">
      <p>Nothing for now, just chilling.</p>
    </div>
  </div>
</div>

<!-- Hidden Music -->
<audio id="musicPlayer" loop>
  <source src="https://image2url.com/r2/default/audio/1773480604788-5b579849-e3af-42d9-bfa5-a4f55956d700.mp3">
</audio>

<!-- Skin Download Button -->
<div id="skinButton">
  <a id="downloadSkin" href="#" download="litacid_skin.png" class="button">Download My Skin</a>
</div>

<script>
// --- Rain & Particles ---
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let rain = [];
for(let i=0;i<400;i++){
  rain.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    l: Math.random()*1.2,
    xs: -2+Math.random()*4,
    ys: 8+Math.random()*10
  });
}

function drawRain(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle="rgba(0,255,255,0.15)";
  ctx.lineWidth=1;
  ctx.beginPath();
  for(let r of rain){
    ctx.moveTo(r.x,r.y);
    ctx.lineTo(r.x+r.l*r.xs,r.y+r.l*r.ys);
  }
  ctx.stroke();
  moveRain();
}
function moveRain(){
  for(let r of rain){
    r.x += r.xs; r.y += r.ys;
    if(r.x>canvas.width||r.y>canvas.height){
      r.x=Math.random()*canvas.width; r.y=-20;
    }
  }
}
setInterval(drawRain, 30);

// Thunder flashes
setInterval(()=>{
  if(Math.random()>0.92){
    document.body.style.background="#111";
    setTimeout(()=>{document.body.style.background="#050505";}, 120)
  }
}, 4000);

// Music autoplay after first click
const music = document.getElementById("musicPlayer");
document.addEventListener('click', ()=>{
  music.play().catch(()=>{});
  document.removeEventListener('click', arguments.callee);
});

// Editor Unlock
function unlockEditor(){
  const code = document.getElementById("editorPassword").value;
  if(code==="kys2"){
    document.getElementById("editableContent").contentEditable="true";
    alert("Editor Mode Unlocked!");
  } else {
    alert("Incorrect code!");
  }
}

// LocalStorage for Work Box
const editable = document.getElementById("editableContent");
editable.innerHTML = localStorage.getItem("workText") || editable.innerHTML;
editable.addEventListener("input", ()=>{
  localStorage.setItem("workText", editable.innerHTML);
});

// Fetch Minecraft Server Info
async function fetchServerInfo(){
  const ip="quitmc.playwithbao.com", port=25565;
  try{
    const res=await fetch(`https://mcapi.us/server/status?ip=${ip}&port=${port}`);
    const data = await res.json();
    document.getElementById("serverStatus").textContent = data.online ? "Online ✅" : "Offline ❌";
    document.getElementById("serverPlayers").textContent = data.online ? `${data.players.now || 0} / ${data.players.max || "?"}` : "-";
    document.getElementById("serverMOTD").textContent = data.online && data.motd ? `MOTD: ${data.motd}` : "";
  }catch(err){
    console.error(err);
    document.getElementById("serverStatus").textContent="Error ❌";
    document.getElementById("serverPlayers").textContent="-";
    document.getElementById("serverMOTD").textContent="";
  }
}
fetchServerInfo();
setInterval(fetchServerInfo,15000);

// Fetch Skin & Set Download
async function setSkinDownload(){
  try{
    const username="litacid";
    const uuidRes=await fetch(`https://api.mojang.com/users/profiles/minecraft/${username}`);
    const uuidData=await uuidRes.json();
    const uuid=uuidData.id;

    const profRes=await fetch(`https://sessionserver.mojang.com/session/minecraft/profile/${uuid}`);
    const profData=await profRes.json();
    const skinProp = profData.properties.find(p=>p.name==="textures");
    const skinJSON = JSON.parse(atob(skinProp.value));
    const skinURL = skinJSON.textures.SKIN.url;

    document.getElementById("downloadSkin").href = skinURL;
  }catch(err){console.error(err);}
}
setSkinDownload();
</script>
</body>
</html>
