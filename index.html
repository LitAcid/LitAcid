<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LitAcid</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>

:root { --theme: rgb(255,0,0); }

body{
margin:0;
background:#050505;
color:white;
font-family:Inter;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-3;
}

.fog{
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,rgba(255,255,255,0.03) 0%,transparent 70%);
animation:fogmove 60s linear infinite;
z-index:-2;
}

@keyframes fogmove{
0%{transform:translate(-20%,-20%)}
100%{transform:translate(0%,0%)}
}

header{
text-align:center;
padding:60px 20px;
}

header h1{
font-family:Orbitron;
font-size:48px;
letter-spacing:4px;
color:var(--theme);
text-shadow:0 0 15px var(--theme),0 0 35px var(--theme);
}

header p{color:#ccc}

#unlockBox{
position:fixed;
top:15px;
left:15px;
z-index:20;
display:flex;
gap:6px;
}

#unlockBox input,#unlockBox button{
padding:6px 10px;
border:none;
border-radius:6px;
}

.container{
display:flex;
justify-content:center;
gap:35px;
padding:30px;
flex-wrap:wrap;
}

.box{
background:rgba(255,255,255,0.05);
border:1px solid var(--theme);
border-radius:20px;
padding:28px;
width:280px;
backdrop-filter:blur(14px);
transition:0.3s;
box-shadow:0 0 20px var(--theme);
}

.box:hover{
transform:translateY(-6px);
}

.server{width:320px}

.button{
display:block;
text-align:center;
padding:12px;
margin:10px 0;
border-radius:10px;
background:white;
color:black;
text-decoration:none;
font-weight:600;
}

#skinButton{
position:fixed;
bottom:15px;
left:15px;
}

#visitorBox{
display:none;
position:fixed;
bottom:15px;
right:15px;
background:#0009;
padding:8px 12px;
border-radius:8px;
}

@media(max-width:850px){

.container{
flex-direction:column;
align-items:center;
padding-bottom:120px;
}

.box{
width:90%;
}

}

</style>
</head>
<body>

<canvas id="rain"></canvas>
<div class="fog"></div>

<header>
<h1>LitAcid</h1>
<p>Minecraft PvP • Server Manager • Game Dev</p>
</header>

<div id="unlockBox">
<input type="password" id="editorPassword" placeholder="editor code">
<button onclick="unlockEditor()">Unlock</button>
</div>

<div class="container">

<div class="box">
<h3>Connect</h3>
<a class="button" href="https://youtube.com/@litacid">YouTube</a>
<a class="button" href="https://instagram.com/litacid2">Instagram</a>
<a class="button">Discord: @litacid</a>
</div>

<div class="box server">
<h3>Minecraft Server</h3>
<p>
IP: <b>quitmc.playwithbao.com</b><br>
Port: 25565
</p>

<p>
Status: <span id="serverStatus">Loading...</span><br>
Players: <span id="serverPlayers">...</span>
</p>

<p id="serverMOTD"></p>

</div>

<div class="box">
<h3>What am I working on</h3>
<div id="editableContent" contenteditable="false">
Nothing right now.
</div>
</div>

</div>

<audio id="musicPlayer" autoplay muted loop>
<source src="https://image2url.com/r2/default/audio/1773480604788-5b579849-e3af-42d9-bfa5-a4f55956d700.mp3" type="audio/mpeg">
</audio>

<div id="skinButton">
<a id="downloadSkin" class="button">Download My Skin</a>
</div>

<div id="visitorBox">
Visitors: <span id="visitorCount">0</span>
</div>

<script>

/* FIREBASE CONFIG */

const firebaseConfig={
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_PROJECT.firebaseapp.com",
databaseURL:"https://YOUR_PROJECT.firebaseio.com",
projectId:"YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig)
const db=firebase.database()

/* MUSIC AUTOPLAY */

const music=document.getElementById("musicPlayer")

setTimeout(()=>{
music.muted=false
music.play().catch(()=>{})
},2000)

/* VISITOR COUNTER */

const visitRef=db.ref("visits")

visitRef.transaction(v=>{
return (v||0)+1
})

visitRef.on("value",snap=>{
document.getElementById("visitorCount").textContent=snap.val()
})

/* EDITOR MODE */

function unlockEditor(){
if(document.getElementById("editorPassword").value==="kys2"){
document.getElementById("visitorBox").style.display="block"
document.getElementById("editableContent").contentEditable=true
alert("Editor Mode Enabled")
}
}

/* SERVER STATUS */

async function fetchServer(){
try{
const r=await fetch("https://mcapi.us/server/status?ip=quitmc.playwithbao.com")
const d=await r.json()

document.getElementById("serverStatus").textContent=d.online?"Online":"Offline"
document.getElementById("serverPlayers").textContent=d.online?`${d.players.now}/${d.players.max}`:"-"
document.getElementById("serverMOTD").textContent=d.motd||""

}catch{
document.getElementById("serverStatus").textContent="Error"
}
}

fetchServer()
setInterval(fetchServer,15000)

/* RAIN */

const canvas=document.getElementById("rain")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let rain=[]
for(let i=0;i<300;i++){
rain.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,l:Math.random(),xs:-3+Math.random()*6,ys:8+Math.random()*8})
}

function drawRain(){
ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.strokeStyle="rgba(255,255,255,0.15)"
ctx.beginPath()

for(let r of rain){
ctx.moveTo(r.x,r.y)
ctx.lineTo(r.x+r.l*r.xs,r.y+r.l*r.ys)
}

ctx.stroke()

for(let r of rain){
r.x+=r.xs
r.y+=r.ys
if(r.y>canvas.height){
r.y=-20
r.x=Math.random()*canvas.width
}
}

}

setInterval(drawRain,30)

/* THUNDER */

setInterval(()=>{
if(Math.random()>0.6){
document.body.style.background="#222"
setTimeout(()=>{document.body.style.background="#050505"},120)
}
},2500)

/* COLOR CYCLE */

let r=255,g=0,b=0

setInterval(()=>{

if(r>0&&b===0){r--;g++}
else if(g>0&&r===0){g--;b++}
else if(b>0&&g===0){b--;r++}

const c=`rgb(${r},${g},${b})`
document.documentElement.style.setProperty("--theme",c)

document.querySelectorAll(".box").forEach(el=>{
el.style.borderColor=c
el.style.boxShadow=`0 0 20px ${c}`
})

},30)

/* SKIN DOWNLOAD */

async function skin(){
const uuid=await fetch("https://api.mojang.com/users/profiles/minecraft/litacid").then(r=>r.json())
const data=await fetch(`https://sessionserver.mojang.com/session/minecraft/profile/${uuid.id}`).then(r=>r.json())
const tex=JSON.parse(atob(data.properties[0].value))
document.getElementById("downloadSkin").href=tex.textures.SKIN.url
}

skin()

</script>

</body>
</html>
