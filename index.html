<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>LitAcid</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Inter&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--theme: rgb(120,120,120);
}

body{
margin:0;
background:#050505;
color:white;
font-family:Inter;
overflow:hidden;
}

/* RAIN CANVAS */
canvas{
position:fixed;
top:0;
left:0;
z-index:-2;
}

/* LIGHTNING */
#lightning{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
z-index:-1;
}

/* HEADER */
header{
text-align:center;
padding:80px 20px;
}

header h1{
font-family:Orbitron;
font-size:48px;
color:var(--theme);
text-shadow:0 0 20px var(--theme);
transition:0.2s;
}

.container{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
padding:20px;
}

.box{
background:rgba(255,255,255,0.05);
border:1px solid var(--theme);
border-radius:20px;
padding:25px;
width:260px;
backdrop-filter:blur(10px);
box-shadow:0 0 20px var(--theme);
}

.button{
display:block;
text-align:center;
padding:10px;
margin:10px 0;
border-radius:10px;
background:white;
color:black;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<canvas id="rain"></canvas>
<div id="lightning"></div>

<header>
<h1>LitAcid</h1>
<p>Minecraft PvP • Server Manager • Web Dev</p>
</header>

<div class="container">

<div class="box">
<h3>Connect</h3>
<a class="button" href="https://youtube.com/@litacid">YouTube</a>
<a class="button" href="https://instagram.com/litacid2">Instagram</a>
<div class="button">Discord: @litacid</div>
</div>

<div class="box">
<h3>🚀 Get Your Website</h3>
<div class="button" onclick="alert('DM me on Instagram or Discord')">Get Started</div>
</div>

</div>

<!-- AUDIO -->
<audio id="music" loop>
<source src="https://image2url.com/r2/default/audio/1774360436413-b8386253-55ef-4984-adfe-37e6030635d6.mp3">
</audio>

<audio id="thunderSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6edb7f0c2e.mp3">
</audio>

<script>

/* ================= SUPABASE ================= */

const supabase = window.supabase.createClient(
"https://exdavylpexaiwzqpaxje.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4ZGF2eWxwZXhhaXd6cXBheGplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNTgyMzUsImV4cCI6MjA4OTkzNDIzNX0.Fog-IUWksijTELBUMCQZPoLLmzhblXy6_2VsK0VUw58"
);

/* ================= MUSIC (FIXED) ================= */

const music = document.getElementById("music");

const ctx = new AudioContext();
const src = ctx.createMediaElementSource(music);
const analyser = ctx.createAnalyser();

src.connect(analyser);
analyser.connect(ctx.destination);

let started = false;

async function startMusic(){
if(started) return;
started = true;

await ctx.resume();

music.volume = 1;
music.play().catch(()=>{});

animateTheme();
}

["click","keydown","scroll","touchstart"].forEach(e=>{
window.addEventListener(e,startMusic,{once:true});
});

/* ================= COLOR REACTION ================= */

const dataArray = new Uint8Array(analyser.frequencyBinCount);

function animateTheme(){
requestAnimationFrame(animateTheme);

analyser.getByteFrequencyData(dataArray);

let total = 0;
for(let i=0;i<dataArray.length;i++){
total += dataArray[i];
}

let avg = total / dataArray.length;
let brightness = Math.min(255, 60 + avg * 1.8);

document.documentElement.style.setProperty(
"--theme",
`rgb(${brightness},${brightness},${brightness})`
);
}

/* ================= RAIN ================= */

const rainCanvas = document.getElementById("rain");
const rctx = rainCanvas.getContext("2d");

rainCanvas.width = window.innerWidth;
rainCanvas.height = window.innerHeight;

let rain = [];

for(let i=0;i<500;i++){
rain.push({
x:Math.random()*rainCanvas.width,
y:Math.random()*rainCanvas.height,
xs:-2+Math.random()*4,
ys:10+Math.random()*8
});
}

function drawRain(){

rctx.clearRect(0,0,rainCanvas.width,rainCanvas.height);

rctx.strokeStyle="rgba(255,255,255,0.2)";
rctx.beginPath();

rain.forEach(r=>{
rctx.moveTo(r.x,r.y);
rctx.lineTo(r.x+r.xs,r.y+r.ys);

r.x+=r.xs;
r.y+=r.ys;

if(r.y>rainCanvas.height){
r.y=-10;
r.x=Math.random()*rainCanvas.width;
}
});

rctx.stroke();
}

setInterval(drawRain,30);

/* ================= THUNDER ================= */

const lightning = document.getElementById("lightning");
const thunder = document.getElementById("thunderSound");

setInterval(()=>{

if(Math.random()>0.75){

lightning.style.opacity="0.9";

setTimeout(()=>{
lightning.style.opacity="0";

thunder.currentTime=0;
thunder.play().catch(()=>{});

},120);

}

},4000);

</script>

</body>
</html>
