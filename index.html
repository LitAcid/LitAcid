<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>LitAcid</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Inter&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
:root{--theme:rgb(255,0,0)}

body{
margin:0;
background:#050505;
color:white;
font-family:Inter;
overflow-x:hidden;
transition:0.2s;
}

canvas{position:fixed;top:0;left:0;z-index:-3}
#visualizer{position:fixed;bottom:0;width:100%;height:120px;z-index:-2;opacity:.6}

header{text-align:center;padding:60px 20px}
header h1{
font-family:Orbitron;
font-size:48px;
color:var(--theme);
text-shadow:0 0 20px var(--theme);
transition:0.2s;
}

.container{display:flex;justify-content:center;gap:35px;padding:30px;flex-wrap:wrap}

.box{
background:rgba(255,255,255,0.05);
border:1px solid var(--theme);
border-radius:20px;
padding:28px;
width:280px;
backdrop-filter:blur(14px);
box-shadow:0 0 20px var(--theme);
transition:0.2s;
}

.server{width:320px}

.button{
display:block;
text-align:center;
padding:12px;
margin:10px 0;
border-radius:10px;
background:white;
color:black;
text-decoration:none;
font-weight:600;
cursor:pointer;
}

#editorUnlock{position:fixed;top:10px;left:10px;z-index:50}
#visitorBox{display:none;position:fixed;bottom:20px;right:20px;background:#0009;padding:8px 12px;border-radius:8px}

.lightning{position:fixed;top:0;left:0;width:100%;height:100%;background:white;opacity:0;pointer-events:none}

@media(max-width:850px){
.container{flex-direction:column;align-items:center}
.box{width:90%}
}
</style>
</head>

<body>

<div id="editorUnlock">
<input id="editorPass" type="password" placeholder="editor code">
<button onclick="unlockEditor()">unlock</button>
</div>

<canvas id="rain"></canvas>
<canvas id="visualizer"></canvas>

<div id="lightning" class="lightning"></div>

<header>
<h1>LitAcid</h1>
<p>Minecraft PvP • Server Manager • Game Dev</p>
</header>

<div class="container">

<div class="box">
<h3>Connect</h3>
<a class="button" href="https://youtube.com/@litacid">YouTube</a>
<a class="button" href="https://instagram.com/litacid2">Instagram</a>
<div class="button">Discord: @litacid</div>
</div>

<div class="box server">
<h3>Minecraft Server</h3>

<p>
IP: <b>quitmc.playwithbao.com</b>
<button onclick="copyIP()">Copy</button>
</p>

<p>
Status: <span id="serverStatus">Loading...</span><br>
Players: <span id="serverPlayers">...</span>
</p>

<p id="serverMOTD"></p>

<h4>Online Players</h4>
<div id="playerList">Loading...</div>
</div>

<div class="box">
<h3>What I am working on rn</h3>
<div id="editableContent" contenteditable="false">
Nothing right now.
</div>
</div>

</div>

<audio id="music" autoplay loop muted>
<source src="https://dl.muzking.net/files/track/2021/08/fumflowie-little-dark-age-x-washing-machine-heart.mp3">
</audio>

<audio id="thunderSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6edb7f0c2e.mp3">
</audio>

<div id="visitorBox">
Visitors: <span id="visitorCount">0</span>
</div>

<script>

/* FIREBASE */
const firebaseConfig={
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_PROJECT.firebaseapp.com",
databaseURL:"https://YOUR_PROJECT.firebaseio.com",
projectId:"YOUR_PROJECT"
}
firebase.initializeApp(firebaseConfig)
const db=firebase.database()

/* EDITOR */
const editor=document.getElementById("editableContent")

function unlockEditor(){
if(document.getElementById("editorPass").value==="kys2"){
editor.contentEditable=true
document.getElementById("visitorBox").style.display="block"
alert("Editor Enabled")

editor.addEventListener("input",()=>{
db.ref("site/content").set(editor.innerHTML)
})
}
}

db.ref("site/content").on("value",snap=>{
if(snap.val()) editor.innerHTML=snap.val()
})

/* VISITS */
const visitRef=db.ref("visits")
visitRef.transaction(v=>(v||0)+1)
visitRef.on("value",snap=>{
document.getElementById("visitorCount").textContent=snap.val()
})

/* COPY */
function copyIP(){
navigator.clipboard.writeText("quitmc.playwithbao.com")
alert("IP Copied")
}

/* SERVER */
async function fetchServer(){
const r=await fetch("https://api.mcsrvstat.us/3/quitmc.playwithbao.com")
const d=await r.json()

serverStatus.textContent=d.online?"Online":"Offline"
serverPlayers.textContent=d.players?`${d.players.online}/${d.players.max}`:"0"
serverMOTD.textContent=d.motd?.clean||""

playerList.innerHTML=""

if(d.players?.list){
d.players.list.forEach(p=>{
const div=document.createElement("div")
div.innerHTML=`<img src="https://mc-heads.net/avatar/${p}/30"> ${p}`
playerList.appendChild(div)
})
}else{
playerList.innerHTML="No players online"
}
}
fetchServer()
setInterval(fetchServer,15000)

/* MUSIC FIX */
const music=document.getElementById("music")
music.play().catch(()=>{})

document.addEventListener("click",()=>{
music.muted=false
music.play()
},{once:true})

/* AUDIO VISUALIZER + COLOR REACTIVE */
const ctxAudio=new AudioContext()
const analyser=ctxAudio.createAnalyser()
const source=ctxAudio.createMediaElementSource(music)

source.connect(analyser)
analyser.connect(ctxAudio.destination)

const vcanvas=document.getElementById("visualizer")
const vctx=vcanvas.getContext("2d")

vcanvas.width=window.innerWidth
vcanvas.height=120

let smooth=0

function drawVisualizer(){
requestAnimationFrame(drawVisualizer)

const data=new Uint8Array(analyser.frequencyBinCount)
analyser.getByteFrequencyData(data)

vctx.clearRect(0,0,vcanvas.width,vcanvas.height)

let total=0
let x=0
const barWidth=vcanvas.width/data.length

data.forEach(v=>{
vctx.fillStyle="cyan"
vctx.fillRect(x,vcanvas.height-v/2,barWidth,v/2)
x+=barWidth+1
total+=v
})

/* SMOOTH INTENSITY */
smooth = smooth*0.8 + (total/data.length)*0.2

const red = Math.min(255, smooth*2)
const glow = smooth/255

document.documentElement.style.setProperty("--theme", `rgb(${red},0,0)`)

document.body.style.boxShadow = `inset 0 0 ${50+smooth}px rgba(${red},0,0,${glow})`
}

music.addEventListener("play",()=>{
ctxAudio.resume()
drawVisualizer()
})

/* RAIN */
const rainCanvas=document.getElementById("rain")
const rctx=rainCanvas.getContext("2d")

rainCanvas.width=window.innerWidth
rainCanvas.height=window.innerHeight

let rain=[]

for(let i=0;i<400;i++){
rain.push({
x:Math.random()*rainCanvas.width,
y:Math.random()*rainCanvas.height,
xs:-3+Math.random()*6,
ys:10+Math.random()*8
})
}

function drawRain(){
rctx.clearRect(0,0,rainCanvas.width,rainCanvas.height)

rctx.strokeStyle="rgba(255,255,255,0.15)"
rctx.beginPath()

rain.forEach(r=>{
rctx.moveTo(r.x,r.y)
rctx.lineTo(r.x+r.xs,r.y+r.ys)

r.x+=r.xs
r.y+=r.ys

if(r.y>rainCanvas.height){
r.y=-10
r.x=Math.random()*rainCanvas.width
}
})

rctx.stroke()
}
setInterval(drawRain,30)

/* LIGHTNING */
const lightning=document.getElementById("lightning")
const thunder=document.getElementById("thunderSound")

setInterval(()=>{
if(Math.random()>0.7){
lightning.style.opacity="0.8"
setTimeout(()=>{
lightning.style.opacity="0"
thunder.play()
},120)
}
},4000)

</script>

</body>
</html>
