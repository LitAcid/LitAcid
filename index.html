<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>LitAcid</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Inter&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{--theme:rgb(180,180,180)}

body{
margin:0;
background:#050505;
color:white;
font-family:Inter;
overflow:hidden;
}

/* CANVAS */
canvas{position:fixed;top:0;left:0;z-index:-2;}
#visualizer{bottom:0;height:140px;z-index:-1}

/* HEADER */
header{text-align:center;padding:60px 20px}
h1{font-family:Orbitron;color:var(--theme);text-shadow:0 0 20px var(--theme)}

/* BOX */
.container{display:flex;flex-wrap:wrap;justify-content:center;gap:30px}
.box{
background:rgba(255,255,255,0.05);
border:1px solid var(--theme);
padding:20px;
border-radius:15px;
width:280px;
}

/* BUTTON */
.button{
background:white;color:black;
padding:10px;margin:8px 0;
text-align:center;border-radius:8px;cursor:pointer;
}

/* EDITOR */
#editorUnlock{position:fixed;top:10px;left:10px;z-index:10}

/* POPUP */
#contactPopup{
display:none;
position:fixed;
top:0;left:0;width:100%;height:100%;
background:#000c;
justify-content:center;align-items:center;
}

.popupBox{
background:#111;padding:20px;border-radius:10px;width:300px;
}

input,textarea{width:100%;margin:5px 0;padding:6px}

/* LIGHTNING */
#lightning{
position:fixed;top:0;left:0;width:100%;height:100%;
background:white;opacity:0;pointer-events:none;
}
</style>
</head>

<body>

<div id="editorUnlock">
<input id="editorPass" placeholder="code">
<button onclick="unlockEditor()">unlock</button>
</div>

<canvas id="rain"></canvas>
<canvas id="visualizer"></canvas>
<div id="lightning"></div>

<header>
<h1>LitAcid</h1>
</header>

<div class="container">

<div class="box">
<h3>Connect</h3>
<a class="button" href="https://youtube.com/@litacid">YouTube</a>
<a class="button" href="https://instagram.com/litacid2">Instagram</a>
<div class="button">Discord: @litacid</div>
</div>

<div class="box">
<h3>What I am doing rn</h3>
<div id="editableContent">Nothing rn</div>
</div>

<div class="box">
<h3>🚀 Get Your Own Website</h3>
<div class="button" onclick="openContact()">Get Started</div>
</div>

</div>

<!-- POPUP -->
<div id="contactPopup">
<div class="popupBox">

<input id="clientName" placeholder="name">
<textarea id="clientMsg" placeholder="message"></textarea>

<div class="button" onclick="sendMessage()">Send</div>
<div class="button" onclick="closeContact()">Close</div>

</div>
</div>

<audio id="music" loop src="https://image2url.com/r2/default/audio/1774360436413-b8386253-55ef-4984-adfe-37e6030635d6.mp3"></audio>
<audio id="thunderSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6edb7f0c2e.mp3"></audio>

<script>

/* SUPABASE */
const supabase = window.supabase.createClient(
"https://exdavylpexaiwzqpaxje.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

/* EDITOR */
function unlockEditor(){
if(document.getElementById("editorPass").value==="kys2"){
let el=document.getElementById("editableContent");
el.contentEditable=true;

/* LOAD GLOBAL */
loadContent();

el.addEventListener("input",saveContent);
}
}

async function saveContent(){
await supabase.from("site_content").upsert({id:1,text:editableContent.innerText});
}

async function loadContent(){
let {data}=await supabase.from("site_content").select("*").eq("id",1).single();
if(data) editableContent.innerText=data.text;
}

/* POPUP */
function openContact(){contactPopup.style.display="flex"}
function closeContact(){contactPopup.style.display="none"}

/* MESSAGE */
async function sendMessage(){
let name=clientName.value,msg=clientMsg.value;
if(!name||!msg)return alert("fill");

await supabase.from("client_requests").insert([{name,message:msg}]);
alert("sent");
closeContact();
}

/* MUSIC FIX */
const music=document.getElementById("music");
const ctx=new AudioContext();
const src=ctx.createMediaElementSource(music);
const analyser=ctx.createAnalyser();

src.connect(analyser);
analyser.connect(ctx.destination);

let started=false;

window.addEventListener("click",async()=>{
if(!started){
await ctx.resume();
music.volume=1;
music.play();
started=true;
draw();
}
});

/* VISUALIZER */
const canvas=document.getElementById("visualizer");
const c=canvas.getContext("2d");
canvas.width=window.innerWidth;

function draw(){
requestAnimationFrame(draw);

let data=new Uint8Array(analyser.frequencyBinCount);
analyser.getByteFrequencyData(data);

c.clearRect(0,0,canvas.width,canvas.height);

let total=0,x=0;

data.forEach(v=>{
let h=v*0.7;
c.fillStyle="white";
c.fillRect(x,canvas.height-h,2,h);
x+=3;
total+=v;
});

let val=Math.min(255,40+total/data.length*2);
document.documentElement.style.setProperty("--theme",`rgb(${val},${val},${val})`);
}

/* RAIN */
const rainCanvas=document.getElementById("rain");
const rctx=rainCanvas.getContext("2d");
rainCanvas.width=innerWidth;
rainCanvas.height=innerHeight;

let rain=[];
for(let i=0;i<500;i++){
rain.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,xs:-2+Math.random()*4,ys:8+Math.random()*6});
}

setInterval(()=>{
rctx.clearRect(0,0,innerWidth,innerHeight);
rctx.strokeStyle="rgba(255,255,255,0.2)";
rctx.beginPath();

rain.forEach(r=>{
rctx.moveTo(r.x,r.y);
rctx.lineTo(r.x+r.xs,r.y+r.ys);

r.x+=r.xs;
r.y+=r.ys;

if(r.y>innerHeight){r.y=0;r.x=Math.random()*innerWidth}
});

rctx.stroke();
},30);

/* LIGHTNING */
setInterval(()=>{
if(Math.random()>0.75){
lightning.style.opacity=1;

setTimeout(()=>{
lightning.style.opacity=0;
thunderSound.currentTime=0;
thunderSound.play();
},100);
}
},4000);

</script>

</body>
</html>
